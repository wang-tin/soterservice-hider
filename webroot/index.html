<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoterService Hider</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { color: #00d4ff; margin-bottom: 20px; text-align: center; }
        .card { background: #16213e; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        h2 { color: #00d4ff; margin-bottom: 15px; font-size: 1.2em; }
        .path-list { list-style: none; }
        .path-item { background: #0f3460; padding: 12px 15px; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .path-item .path { font-family: monospace; color: #00ff88; word-break: break-all; }
        .path-item .remove { background: #e94560; color: white; border: none; padding: 5px 12px; border-radius: 5px; cursor: pointer; }
        .add-form { display: flex; gap: 10px; margin-top: 15px; }
        input[type="text"] { flex: 1; padding: 12px; border: 1px solid #0f3460; border-radius: 8px; background: #0f3460; color: #fff; font-size: 14px; }
        button { background: #00d4ff; color: #1a1a2e; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: all 0.3s; }
        .status { display: flex; gap: 20px; margin-bottom: 20px; }
        .status-item { flex: 1; background: #0f3460; padding: 15px; border-radius: 8px; text-align: center; }
        .status-item .value { font-size: 24px; font-weight: bold; color: #00d4ff; }
        .status-item .label { color: #888; margin-top: 5px; font-size: 12px; }
        .info { background: #0f3460; padding: 15px; border-radius: 8px; margin-top: 15px; }
        .info h3 { color: #00d4ff; margin-bottom: 10px; }
        .info ul { padding-left: 20px; }
        .info li { margin-bottom: 5px; color: #ccc; }
        .actions { display: flex; gap: 10px; margin-top: 15px; }
        .actions button { flex: 1; }
        .btn-refresh { background: #7b2cbf; }
        .btn-reboot { background: #e94560; }
        .loading { text-align: center; padding: 20px; color: #888; }
        code { background: #16213e; padding: 2px 6px; border-radius: 4px; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #16213e; padding: 15px 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); display: none; z-index: 1000; }
        .toast.show { display: block; }
        .toast.error { border-left: 4px solid #e94560; }
        .toast.success { border-left: 4px solid #00ff88; }
    </style>
</head>
<body>
    <div class="container">
        <h1>SoterService Hider</h1>

        <div class="status">
            <div class="status-item">
                <div class="value" id="pathCount">-</div>
                <div class="label">隐藏路径数</div>
            </div>
            <div class="status-item">
                <div class="value" id="moduleVersion">-</div>
                <div class="label">模块版本</div>
            </div>
        </div>

        <div class="card">
            <h2>当前隐藏路径</h2>
            <ul class="path-list" id="pathList">
                <li class="loading">加载中...</li>
            </ul>

            <form class="add-form" id="addForm">
                <input type="text" id="newPath" placeholder="/system_ext/app/SoterService" required>
                <button type="submit">添加</button>
            </form>
        </div>

        <div class="card">
            <h2>快速操作</h2>
            <div class="actions">
                <button class="btn-refresh" id="refreshBtn">刷新状态</button>
                <button class="btn-reboot" id="rebootBtn">重启设备</button>
            </div>
        </div>

        <div class="card">
            <div class="info">
                <h3>使用说明</h3>
                <ul>
                    <li>默认已隐藏 <code>/system_ext/app/SoterService</code></li>
                    <li>添加路径后需重启生效</li>
                    <li>支持所有Magisk版本（普通/LKM/KSU）</li>
                </ul>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        var MODULE_ID = 'soterservice_hider';
        var MODULE_DIR = '/data/adb/modules/' + MODULE_ID;
        var CONFIG_FILE = MODULE_DIR + '/sus_path.txt';
        
        var pathsCache = ['/system_ext/app/SoterService'];
        
        function showToast(message, type) {
            var toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast show ' + type;
            setTimeout(function() {
                toast.className = 'toast';
            }, 3000);
        }
        
        function loadPaths() {
            var pathList = document.getElementById('pathList');
            pathList.innerHTML = '<li class="loading">加载中...</li>';
            
            var xhr = new XMLHttpRequest();
            xhr.open('GET', '../sus_path.txt', true);
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    if (xhr.status === 200 && xhr.responseText) {
                        parseAndDisplayPaths(xhr.responseText);
                    } else {
                        parseAndDisplayPaths('# Default paths\n/system_ext/app/SoterService');
                    }
                }
            };
            xhr.onerror = function() {
                parseAndDisplayPaths('# Default paths\n/system_ext/app/SoterService');
            };
            xhr.send();
        }
        
        function parseAndDisplayPaths(text) {
            var lines = text.split('\n');
            pathsCache = [];
            
            for (var i = 0; i < lines.length; i++) {
                var line = lines[i].trim();
                if (line && !line.startsWith('#')) {
                    var path = line.split(' ')[0];
                    if (path && path.startsWith('/')) {
                        pathsCache.push(path);
                    }
                }
            }
            
            var pathList = document.getElementById('pathList');
            pathList.innerHTML = '';
            
            if (pathsCache.length === 0) {
                pathList.innerHTML = '<li class="path-item"><span class="path">暂无隐藏路径</span></li>';
            } else {
                for (var i = 0; i < pathsCache.length; i++) {
                    (function(path) {
                        var li = document.createElement('li');
                        li.className = 'path-item';
                        
                        var span = document.createElement('span');
                        span.className = 'path';
                        span.textContent = path;
                        li.appendChild(span);
                        
                        var btn = document.createElement('button');
                        btn.className = 'remove';
                        btn.textContent = '移除';
                        btn.onclick = function() { removePath(path); };
                        li.appendChild(btn);
                        
                        pathList.appendChild(li);
                    })(pathsCache[i]);
                }
            }
            
            document.getElementById('pathCount').textContent = pathsCache.length;
        }
        
        function addPath(e) {
            e.preventDefault();
            var input = document.getElementById('newPath');
            var newPath = input.value.trim();
            
            if (!newPath) {
                showToast('请输入路径', 'error');
                return;
            }
            
            if (!newPath.startsWith('/')) {
                showToast('路径必须以 / 开头', 'error');
                return;
            }
            
            if (pathsCache.indexOf(newPath) !== -1) {
                showToast('路径已存在', 'error');
                return;
            }
            
            var success = false;
            
            if (typeof ksueval === 'function') {
                ksueval('echo "' + newPath + '" >> ' + CONFIG_FILE, function() {
                    pathsCache.push(newPath);
                    showToast('路径已添加: ' + newPath, 'success');
                    input.value = '';
                    loadPaths();
                });
                return;
            }
            
            if (typeof execCommand === 'function') {
                execCommand('echo "' + newPath + '" >> ' + CONFIG_FILE, function() {
                    pathsCache.push(newPath);
                    showToast('路径已添加: ' + newPath, 'success');
                    input.value = '';
                    loadPaths();
                });
                return;
            }
            
            showToast('请手动编辑配置文件:\n' + CONFIG_FILE, 'error');
        }
        
        function removePath(path) {
            if (!confirm('确定要移除 ' + path + ' ?')) return;
            
            var index = pathsCache.indexOf(path);
            if (index !== -1) {
                pathsCache.splice(index, 1);
            }
            
            if (typeof ksueval === 'function') {
                ksueval('sed -i "\\|^' + path + '$|d" ' + CONFIG_FILE, function() {
                    showToast('路径已移除', 'success');
                    loadPaths();
                });
                return;
            }
            
            if (typeof execCommand === 'function') {
                execCommand('sed -i "\\|^' + path + '$|d" ' + CONFIG_FILE, function() {
                    showToast('路径已移除', 'success');
                    loadPaths();
                });
                return;
            }
            
            showToast('请手动编辑配置文件:\n' + CONFIG_FILE, 'error');
        }
        
        function rebootDevice() {
            if (!confirm('确定要重启设备吗？')) return;
            
            if (typeof ksueval === 'function') {
                ksueval('reboot', function() {});
            } else if (typeof execCommand === 'function') {
                execCommand('reboot', function() {});
            } else {
                showToast('请手动重启设备', 'error');
            }
        }
        
        document.getElementById('addForm').addEventListener('submit', addPath);
        document.getElementById('refreshBtn').addEventListener('click', function() {
            loadPaths();
            showToast('状态已刷新', 'success');
        });
        document.getElementById('rebootBtn').addEventListener('click', rebootDevice);
        
        document.getElementById('moduleVersion').textContent = 'v1.6';
        
        loadPaths();
    </script>
</body>
</html>
