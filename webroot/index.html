<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoterService Hider</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { color: #00d4ff; margin-bottom: 20px; text-align: center; }
        .card { background: #16213e; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        h2 { color: #00d4ff; margin-bottom: 15px; font-size: 1.2em; }
        .path-list { list-style: none; }
        .path-item { background: #0f3460; padding: 12px 15px; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .path-item .path { font-family: monospace; color: #00ff88; }
        .path-item .remove { background: #e94560; color: white; border: none; padding: 5px 12px; border-radius: 5px; cursor: pointer; }
        .path-item .remove:hover { background: #ff6b6b; }
        .add-form { display: flex; gap: 10px; margin-top: 15px; }
        input[type="text"] { flex: 1; padding: 12px; border: 1px solid #0f3460; border-radius: 8px; background: #0f3460; color: #fff; font-size: 14px; }
        button { background: #00d4ff; color: #1a1a2e; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: all 0.3s; }
        button:hover { background: #00a8cc; transform: translateY(-2px); }
        .status { display: flex; gap: 20px; margin-bottom: 20px; }
        .status-item { flex: 1; background: #0f3460; padding: 15px; border-radius: 8px; text-align: center; }
        .status-item .value { font-size: 24px; font-weight: bold; color: #00d4ff; }
        .status-item .label { color: #888; margin-top: 5px; font-size: 12px; }
        .info { background: #0f3460; padding: 15px; border-radius: 8px; margin-top: 15px; }
        .info h3 { color: #00d4ff; margin-bottom: 10px; }
        .info ul { padding-left: 20px; }
        .info li { margin-bottom: 5px; color: #ccc; }
        .actions { display: flex; gap: 10px; margin-top: 15px; }
        .actions button { flex: 1; }
        .btn-refresh { background: #7b2cbf; }
        .btn-refresh:hover { background: #9d4edd; }
        .btn-reboot { background: #e94560; }
        .btn-reboot:hover { background: #ff6b6b; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛡️ SoterService Hider</h1>

        <div class="status">
            <div class="status-item">
                <div class="value" id="pathCount">0</div>
                <div class="label">隐藏路径数</div>
            </div>
            <div class="status-item">
                <div class="value" id="hiddenCount">0</div>
                <div class="label">已隐藏数</div>
            </div>
        </div>

        <div class="card">
            <h2>📍 当前隐藏路径</h2>
            <ul class="path-list" id="pathList">
                <li class="path-item"><span class="path">加载中...</span></li>
            </ul>

            <form class="add-form" onsubmit="addPath(event)">
                <input type="text" id="newPath" placeholder="输入要隐藏的路径，例如: /system/app/SomeApp">
                <button type="submit">添加</button>
            </form>
        </div>

        <div class="card">
            <h2>⚡ 快速操作</h2>
            <div class="actions">
                <button class="btn-refresh" onclick="refreshStatus()">🔄 刷新状态</button>
                <button class="btn-reboot" onclick="rebootDevice()">🔄 重启设备</button>
            </div>
        </div>

        <div class="card">
            <div class="info">
                <h3>📖 使用说明</h3>
                <ul>
                    <li>默认已隐藏 <code>/system_ext/app/SoterService</code></li>
                    <li>添加路径后会自动隐藏，重启生效</li>
                    <li>支持所有Magisk版本（普通/LKM/KSU）</li>
                    <li>使用bind mount技术，不依赖内核补丁</li>
                </ul>
            </div>
        </div>
    </div>

    <script>
        const MODULE_DIR = '/data/adb/modules/soterservice_hider';
        const CONFIG_FILE = MODULE_DIR + '/sus_path.txt';

        async function loadPaths() {
            try {
                const response = await fetch('/webroot/sus_path.txt');
                const text = await response.text();
                const paths = text.split('\\n')
                    .filter(line => line.trim() && !line.startsWith('#'))
                    .map(line => line.trim().split(' ')[0]);

                const pathList = document.getElementById('pathList');
                pathList.innerHTML = '';

                if (paths.length === 0) {
                    pathList.innerHTML = '<li class="path-item"><span class="path">暂无隐藏路径</span></li>';
                } else {
                    paths.forEach(path => {
                        const li = document.createElement('li');
                        li.className = 'path-item';
                        li.innerHTML = \`
                            <span class="path">\${path}</span>
                            <button class="remove" onclick="removePath('\${path}')">移除</button>
                        \`;
                        pathList.appendChild(li);
                    });
                }

                document.getElementById('pathCount').textContent = paths.length;
            } catch (e) {
                console.error('Error loading paths:', e);
            }
        }

        async function addPath(e) {
            e.preventDefault();
            const input = document.getElementById('newPath');
            const newPath = input.value.trim();

            if (!newPath) return alert('请输入路径');

            try {
                const response = await fetch('/webroot/config', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: 'action=add&path=' + encodeURIComponent(newPath)
                });

                if (response.ok) {
                    input.value = '';
                    loadPaths();
                    alert('路径已添加: ' + newPath);
                }
            } catch (e) {
                alert('添加失败，请手动编辑 ' + CONFIG_FILE);
            }
        }

        async function removePath(path) {
            if (!confirm('确定要移除 ' + path + '?')) return;

            try {
                const response = await fetch('/webroot/config', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: 'action=remove&path=' + encodeURIComponent(path)
                });

                if (response.ok) {
                    loadPaths();
                    alert('路径已移除');
                }
            } catch (e) {
                alert('移除失败，请手动编辑 ' + CONFIG_FILE);
            }
        }

        function refreshStatus() {
            loadPaths();
            alert('状态已刷新');
        }

        function rebootDevice() {
            if (confirm('确定要重启设备吗？')) {
                window.location.href = '/reboot';
            }
        }

        loadPaths();
    </script>
</body>
</html>
